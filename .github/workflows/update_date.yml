name: Update Markdown Dates

on:
  schedule:
    - cron: '0 2 * * 1' 
  workflow_dispatch:     

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib python-dateutil

      - name: Decode service account key
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_JSON }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > drive-api-project-452000-10d4b5dc6bcc.json

      - name: Run update script
        run: python update_script.py

      - name: Configure Git Identity
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
        
      - name: Create branch and push changes
        run: |
          git checkout -b auto/md-update
          git add docs/
          git commit -m "Update last modified from Google Drive" || echo "No changes to commit"
          git push origin auto/md-update


      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Update last modified dates in Markdown from Google Drive"
          title: "PR: Update Markdown with latest Google Drive dates"
          body: |
            A pull request automatically created by GitHub Actions to update the last modified date from Google Drive into the Markdown file.
          branch: auto/md-update
          base: VietHoang
          delete-branch: true
          push-to-fork: true
